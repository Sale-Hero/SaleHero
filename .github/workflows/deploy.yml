name: Deploy to Remote Server via SSH

on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # 시크릿 설정 파일 생성
      - name: Add secret configuration
        run: |
          mkdir -p src/main/resources
          echo '${{ secrets.APPLICATION_SECRET }}' > src/main/resources/application-secret.yml

      # Gradle 빌드 실행
      - name: Build with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew clean build -x test

      # 설정 파일 확인
      - name: Verify config file
        run: |
          ls -la src/main/resources/
          cat src/main/resources/application.yml

      # 프로젝트 전체 압축
      - name: Create ZIP archive
        run: |
          zip -r salehero.zip . -x ".git/*" ".github/*" "node_modules/*" ".gradle/*" ".idea/*" "*.iml" ".gitignore"
          ls -la salehero.zip

      # SSH 접근 설정
      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      
      - name: Add known hosts
        run: |
          ssh-keyscan -H ${{ secrets.REMOTE_HOST }} >> ~/.ssh/known_hosts

      # 서버에 필요한 폴더 생성
      - name: Create directories on remote server
        run: |
          ssh ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }} "mkdir -p /salehero"

      # ZIP 파일 전송
      - name: Copy ZIP to remote server
        run: |
          scp salehero.zip ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }}:/salehero/

      # 배포 스크립트 실행
      - name: Deploy on remote server
        run: |
          ssh ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }} "
            cd /salehero &&
            rm -rf app || true &&
            mkdir -p app &&
            unzip -o salehero.zip -d app &&
            cd app &&
            docker-compose down || true &&
            docker-compose build --no-cache &&
            docker-compose up -d
          "

      # 배포 완료 알림
      - name: Deployment notification
        run: echo "✅ Deployment completed successfully!"
