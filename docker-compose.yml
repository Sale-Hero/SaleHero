services:
  salehero:
    container_name: salehero-container
    build: .
    ports:
      - "8880:8880"
    networks:
      - salehero-network
    environment:
      - SPRING_PROFILES_ACTIVE=prod,secret
    depends_on:
      - mysql
      - redis

  mysql:
    container_name: mysql-container
    image: mysql:8.0.28
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=Gkdgo9912!
      - MYSQL_DATABASE=dailysale
      - MYSQL_USER=dailysale
      - MYSQL_PASSWORD=Gkdgo9912!
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - salehero-network


  redis:
    container_name: redis-container
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass Gkdgo9912!
    volumes:
      - redis-data:/data
    networks:
      - salehero-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  n8n:
    container_name: n8n
    image: n8nio/n8n:1.115.3
    ports:
      - "5678:5678"
    environment:
      - NODE_ENV=production
      - N8N_HOST=n8n.salehero.kr
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://n8n.salehero.kr/
      - N8N_TRUST_PROXY=true
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_RUNNERS_ENABLED=true
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - salehero-network
    restart: unless-stopped

networks:
  salehero-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  n8n-data:
